<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="format-detection" content="telephone=no">
<title>Text Product Pic and Details</title>
<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f3f4f6;
  margin: 0;
  padding: 16px;
  box-sizing: border-box;
}

.container {
  max-width: 840px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 16px;
}

.panel {
  background: #ffffff;
  border-radius: 8px;
  padding: 12px 16px 14px;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
  border: 1px solid #e5e7eb;
}

h2 {
  margin: 0 0 10px;
  font-size: 16px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #111827;
}

.form-group { margin-bottom: 8px; }

label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #6b7280;
  margin-bottom: 2px;
}

input[type="text"],
input[type="number"] {
  width: 100%;
  box-sizing: border-box;
  padding: 7px 9px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
  font-size: 13px;
  outline: none;
}

input[type="text"]:focus,
input[type="number"]:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
  color: #374151;
}

.preview-text {
  margin-top: 8px;
  padding: 8px 9px;
  background: #f3f4f6;
  border-radius: 6px;
  font-size: 12px;
  color: #374151;
  white-space: pre-wrap;
}

.spec-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.spec-wrap { position: relative; }
.spec-wrap input { padding-right: 22px; }
.spec-unit {
  position: absolute;
  right: 7px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: #6b7280;
  pointer-events: none;
}

/* CARD */
.card-wrapper {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: #ffffff;
  border-radius: 8px;
  border: 1px solid #e5e7eb;
  overflow: hidden;
  width: 360px;
  max-width: 100%;
  margin: 0 auto;
  box-shadow: 0 4px 14px rgba(15,23,42,0.09);
}

/* IMAGE AREA */
.card-image {
  width: 100%;
  height: 320px;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid #e5e7eb;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  touch-action: none;
}

.card-image span {
  font-size: 13px;
  color: #9ca3af;
  text-align: center;
  padding: 0 20px;
  pointer-events: none;
}

.card-image img {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: 50% 50%;
  height: 100%;
  width: auto;
  cursor: grab;
  user-select: none;
  -webkit-user-drag: none;
}

/* CARD TEXT — matches your reference image */
.card-body {
  padding: 14px 16px 14px;
}

.card-title {
  font-size: 16px;
  font-weight: 700;
  color: #111827;
  margin: 0 0 3px 0;
  line-height: 1.3;
}

.card-metal {
  font-size: 14px;
  font-weight: 400;
  color: #374151;
  margin: 0 0 2px 0;
  line-height: 1.4;
}

.card-specs {
  font-size: 14px;
  font-weight: 400;
  color: #374151;
  margin: 0 0 0 0;
  line-height: 1.4;
}

.card-price {
  font-size: 22px;
  font-weight: 800;
  color: #111827;
  margin: 12px 0 4px 0;
  line-height: 1.2;
}

.card-contact {
  font-size: 10px;
  color: #6b7280;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  white-space: nowrap;
  margin: 0;
  /* prevent iOS blue link */
  -webkit-text-fill-color: #6b7280;
  text-decoration: none !important;
}

/* force any auto-linked phone/email to match */
.card-contact a,
.card-contact a:link,
.card-contact a:visited,
.card-contact a:active,
.card-contact a:hover {
  color: #6b7280 !important;
  -webkit-text-fill-color: #6b7280 !important;
  text-decoration: none !important;
}

.button-row {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}

.btn {
  display: inline-flex;
  align-items: center;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid #d1d5db;
  font-size: 12px;
  cursor: pointer;
  background: #ffffff;
  color: #111827;
  white-space: nowrap;
}

.btn-primary {
  background: #111827;
  color: #f9fafb;
  border-color: #111827;
}
</style>
</head>
<body>

<div class="container">
  <!-- LEFT: FORM -->
  <div class="panel">
    <h2>Item Info</h2>

    <div class="form-group">
      <label for="clientName">Client</label>
      <input id="clientName" type="text" placeholder="Sarah Johnson">
    </div>

    <div class="form-group">
      <label for="itemName">Item Title</label>
      <input id="itemName" type="text" placeholder="Vintage Popcorn Chain">
    </div>

    <div class="form-group">
      <label for="metal">Metal</label>
      <input id="metal" type="text" placeholder="22k Yellow Gold">
    </div>

    <div class="form-group">
      <label>Specs</label>
      <div class="spec-grid">
        <div class="spec-wrap">
          <input id="spec1" type="text" placeholder="12.74">
          <span class="spec-unit">g</span>
        </div>
        <div class="spec-wrap">
          <input id="spec2" type="text" placeholder='24'>
          <span class="spec-unit">"</span>
        </div>
        <div class="spec-wrap">
          <input id="spec3" type="text" placeholder="2">
          <span class="spec-unit">mm</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="price">Price</label>
      <input id="price" type="number" placeholder="2800">
    </div>

    <div class="form-group">
      <label for="note">Message to Client</label>
      <input id="note" type="text" placeholder="Here's the necklace we talked about.">
    </div>

    <div class="row">
      <span>Show contact info on card</span>
      <label style="display:flex;align-items:center;gap:4px;">
        <input id="contactToggle" type="checkbox" checked>
        <span>On</span>
      </label>
    </div>

    <div id="previewText" class="preview-text"></div>
  </div>

  <!-- RIGHT: CARD PREVIEW -->
  <div class="panel">
    <h2>Card Preview</h2>
    <div class="card-wrapper">
      <div id="card" class="card">
        <div id="imageBox" class="card-image">
          <span>Tap to choose a photo from your iPad</span>
        </div>
        <input id="photoInput" type="file" accept="image/*" style="display:none;">
        <div class="card-body">
          <div id="cardTitle" class="card-title">Vintage Popcorn Chain</div>
          <div id="cardMetal" class="card-metal">22k Yellow Gold</div>
          <div id="cardSpecs" class="card-specs">12.74g * 24"</div>
          <div id="cardPrice" class="card-price">$2,800</div>
          <div id="cardContact" class="card-contact">JENBARATZ@HOTMAIL.COM &nbsp;•&nbsp; 512.578.8477</div>
        </div>
      </div>

      <div class="button-row">
        <button id="clearBtn" class="btn" type="button">Clear</button>
        <button id="saveBtn" class="btn btn-primary" type="button">Save Card as Image</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
  integrity="sha512-BNa5lG2P+4O1QRbt7YIAO1VdlEbcFpMhF5Bvl2uR2rNvqA7qO5uSuyFJfVTuqq5LiklCgEeqY6VJQmBMRQ4YLg=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
// Title-case helper
function toTitleCase(str) {
  return str.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1));
}

// Auto-capitalize on each text input as user types
['clientName','itemName','metal','note'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input', function() {
    const pos = this.selectionStart;
    this.value = toTitleCase(this.value);
    this.setSelectionRange(pos, pos);
  });
});

function formatPrice(value) {
  if (!value) return '';
  const num = Number(value);
  if (isNaN(num)) return value;
  return '$' + num.toLocaleString();
}

function updateAll() {
  const client = document.getElementById('clientName').value.trim();
  const item   = document.getElementById('itemName').value.trim();
  const metal  = document.getElementById('metal').value.trim();
  const spec1  = document.getElementById('spec1').value.trim();
  const spec2  = document.getElementById('spec2').value.trim();
  const spec3  = document.getElementById('spec3').value.trim();
  const price  = document.getElementById('price').value.trim();
  const note   = document.getElementById('note').value.trim();
  const showContact = document.getElementById('contactToggle').checked;

  // Build specs — only include filled slots, no space before g/mm
  const parts = [];
  if (spec1) parts.push(spec1 + 'g');
  if (spec2) parts.push(spec2 + '"');
  if (spec3) parts.push(spec3 + 'mm');
  const specs = parts.join(' * ');

  document.getElementById('cardTitle').textContent  = item  || 'Item Title';
  document.getElementById('cardMetal').textContent  = metal || 'Metal';
  document.getElementById('cardSpecs').textContent  = specs || 'Specs';
  document.getElementById('cardPrice').textContent  = formatPrice(price) || '$0';
  document.getElementById('cardContact').style.display = showContact ? 'block' : 'none';

  // Preview text
  const firstName = client ? client.split(' ')[0] : '';
  const greeting  = note || (firstName ? `Hi ${firstName},` : '');
  const lines = [];
  if (greeting) lines.push(greeting);
  if (item)  lines.push(item);
  if (metal) lines.push(metal);
  if (specs) lines.push(specs);
  if (price) lines.push('Price: ' + formatPrice(price));
  document.getElementById('previewText').textContent = lines.join('\n');
}

['clientName','itemName','metal','spec1','spec2','spec3','price','note','contactToggle']
  .forEach(id => document.getElementById(id).addEventListener('input', updateAll));

document.getElementById('clearBtn').addEventListener('click', () => {
  ['clientName','itemName','metal','spec1','spec2','spec3','price','note']
    .forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('contactToggle').checked = true;
  resetImageBox();
  updateAll();
});

// ── PHOTO: pick, drag, zoom ──────────────────────────────────────────
const imageBox   = document.getElementById('imageBox');
const photoInput = document.getElementById('photoInput');

function resetImageBox() {
  imageBox.innerHTML = '<span>Tap to choose a photo from your iPad</span>';
}

imageBox.addEventListener('click', () => photoInput.click());

photoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    imageBox.innerHTML = '';
    const img = document.createElement('img');
    img.src = ev.target.result;
    img.dataset.ox = 0;
    img.dataset.oy = 0;
    img.dataset.scale = 1;
    imageBox.appendChild(img);
    attachControls(imageBox);
  };
  reader.readAsDataURL(file);
});

function applyTransform(img) {
  const ox = parseFloat(img.dataset.ox || 0);
  const oy = parseFloat(img.dataset.oy || 0);
  const sc = parseFloat(img.dataset.scale || 1);
  img.style.transform =
    `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px)) scale(${sc})`;
}

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function attachControls(container) {
  let img = container.querySelector('img');
  let dragging = false;
  let sx = 0, sy = 0, sox = 0, soy = 0;
  let pinchD0 = 0, pinchS0 = 1;

  // MOUSE
  container.addEventListener('mousedown', e => {
    if (e.target.tagName !== 'IMG') return;
    img = e.target;
    dragging = true;
    sx = e.clientX; sy = e.clientY;
    sox = parseFloat(img.dataset.ox || 0);
    soy = parseFloat(img.dataset.oy || 0);
    img.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging || !img) return;
    img.dataset.ox = sox + (e.clientX - sx);
    img.dataset.oy = soy + (e.clientY - sy);
    applyTransform(img);
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    if (img) img.style.cursor = 'grab';
  });

  // TOUCH drag + pinch
  container.addEventListener('touchstart', e => {
    img = container.querySelector('img');
    if (!img) return;
    if (e.touches.length === 1) {
      dragging = true;
      sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      sox = parseFloat(img.dataset.ox || 0);
      soy = parseFloat(img.dataset.oy || 0);
    } else if (e.touches.length === 2) {
      dragging = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchD0 = Math.sqrt(dx*dx + dy*dy);
      pinchS0 = parseFloat(img.dataset.scale || 1);
    }
  }, { passive: false });

  container.addEventListener('touchmove', e => {
    img = container.querySelector('img');
    if (!img) return;
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      img.dataset.ox = sox + (e.touches[0].clientX - sx);
      img.dataset.oy = soy + (e.touches[0].clientY - sy);
      applyTransform(img);
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (!pinchD0) return;
      img.dataset.scale = clamp(pinchS0 * (d / pinchD0), 0.5, 4);
      applyTransform(img);
    }
  }, { passive: false });

  container.addEventListener('touchend', e => {
    if (e.touches.length === 0) { dragging = false; pinchD0 = 0; }
  });
}

// ── SAVE CARD AS IMAGE ───────────────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', () => {
  const card = document.getElementById('card');
  html2canvas(card, {
    backgroundColor: '#ffffff',
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false
  }).then(canvas => {
    const name   = (document.getElementById('itemName').value.trim() || 'jewelry-card');
    const dataUrl = canvas.toDataURL('image/png');

    // Open image in new tab — on iPad long-press the image → Save to Photos
    const win = window.open('', '_blank');
    if (win) {
      win.document.write(`<!DOCTYPE html><html><head>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>${name}</title>
        <style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:flex-start;}
        img{width:100%;max-width:600px;display:block;}</style>
        </head><body>
        <img src="${dataUrl}" alt="${name}">
        <p style="color:#fff;text-align:center;font-size:14px;padding:12px;">
          Long-press the image above, then tap <strong>Save to Photos</strong>.
        </p>
        </body></html>`);
      win.document.close();
    } else {
      alert('Popup was blocked. Please allow popups for this site, then try again.');
    }
  }).catch(err => {
    console.error(err);
    alert('Could not create image — make sure you are online and try again.');
  });
});

updateAll();
</script>
</body>
</html>
